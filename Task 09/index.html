<!DOCTYPE html>
<html>
<head>
    <title>Task 09 Advanced Layout</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

    
        header {
            position: sticky;
            top: 0;
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            z-index: 10;
        }

        .container {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 10px;
            padding: 10px;
        }

     
        .sidebar {
            background: #444;
            color: white;
            padding: 15px;
        }

      
        .main {
            background: #f4f4f4;
            padding: 15px;
        }

      
        .cards {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            flex: 1 1 150px;
            border-radius: 5px;
        }

        .overlay-box {
            position: relative;
            top: -20px;
            background: orange;
            padding: 10px;
            z-index: 5;
        }

      
        @media (max-width: 700px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: 2;
            }

            .main {
                order: 1;
            }
        }
    </style>
</head>

<body>

<header>
    Task 09 Website Header
</header>

<div class="container">

    <div class="sidebar">
        <h3>Sidebar</h3>
        <p>Links here</p>
    </div>

    <div class="main">

        <div class="overlay-box">
            Highlight Box
        </div>

        <h2>Main Content</h2>

        <div class="cards">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
        </div>

    </div>

</div>

</body>
</html>
