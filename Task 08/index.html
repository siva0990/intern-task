<!DOCTYPE html>
<html>
<head>
    <title>Accordion</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        h2 {
            text-align: center;
        }

        .accordion {
            max-width: 500px;
            margin: auto;
        }

       
        input {
            display: none;
        }

     
        label {
            display: block;
            background: #333;
            color: white;
            padding: 12px;
            margin-top: 5px;
            cursor: pointer;
            border-radius: 5px;
        }

        
        .content {
            background: white;
            padding: 0 12px;
            max-height: 0;
            overflow: hidden;
            transition: 0.3s;
            border-radius: 0 0 5px 5px;
        }

        
        input:checked + label + .content {
            max-height: 150px;
            padding: 12px;
        }
    </style>
</head>

<body>

<h2>Task 08 Accordion</h2>

<div class="accordion">

    <input type="checkbox" id="a1">
    <label for="a1">Section 1</label>
    <div class="content">
        <p>This is content for section 1.</p>
    </div>

    <input type="checkbox" id="a2">
    <label for="a2">Section 2</label>
    <div class="content">
        <p>This is content for section 2.</p>
    </div>

    <input type="checkbox" id="a3">
    <label for="a3">Section 3</label>
    <div class="content">
        <p>This is content for section 3.</p>
    </div>

</div>

</body>
</html>
