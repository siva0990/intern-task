<!DOCTYPE html>
<html>
<head>
    <title>Task 06 Tabs</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        h2 {
            text-align: center;
        }

        .tabs {
            max-width: 500px;
            margin: auto;
        }


        input[type="radio"] {
            display: none;
        }


        label {
            padding: 12px 20px;
            background: #ddd;
            margin-right: 5px;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
            transition: 0.3s;
        }

        label:hover {
            background: #bbb;
        }

        input:checked + label {
            background: #007BFF;
            color: white;
        }

        
        .content {
            background: white;
            padding: 20px;
            border-radius: 0 6px 6px 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
        }

        #tab1:checked ~ #content1,
        #tab2:checked ~ #content2,
        #tab3:checked ~ #content3 {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

<h2>Task 06 Tabs</h2>

<div class="tabs">

    <input type="radio" id="tab1" name="tabs" checked>
    <label for="tab1">Home</label>

    <input type="radio" id="tab2" name="tabs">
    <label for="tab2">About</label>

    <input type="radio" id="tab3" name="tabs">
    <label for="tab3">Contact</label>

    <div id="content1" class="content">
        <p>Welcome! This is the home section.</p>
    </div>

    <div id="content2" class="content">
        <p>This section contains information about us.</p>
    </div>

    <div id="content3" class="content">
        <p>Contact details are shown here.</p>
    </div>

</div>

</body>
</html>
